{{define "content"}}
    <form action="/books/update" Method="POST">
    <label for="Title">Title:</label>
    <input type="text" id="Title" name="title" value="{{.Title}}"><br><br>
    <label for="Author">Author:</label>
    <input type="text" id="Author" name="author" value="{{.Author}}"><br><br>
    <label for="PublishedDate">Publish Date:</label>
    <input type="number" id="PublishedDate" name="publisheddate" value="{{.PublishedDate}}"><br><br>
    <label for="Edition">Edition:</label>
    <input type="number" id="Edition" name="edition" value="{{.Edition}}">
    <input type="hidden" name="id" value="{{.ID}}">
    <a href="/books">Submit</a>
    </form>
{{end}}
